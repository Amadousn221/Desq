name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOST: 145.79.20.84
          USER: u415053603
          PORT: 65002
          TARGET: /home/u415053603/domains/desqenergy.com/public_html/wp-content/themes/desq-energy-theme
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $PORT -H $HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=no -o BatchMode=yes" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='*.pdf' \
            --exclude='specs/' \
            --exclude='pages/' \
            --exclude='github-actions-key*' \
            ./ $USER@$HOST:$TARGET/

          echo "Deploy OK"
