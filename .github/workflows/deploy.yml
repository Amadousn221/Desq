name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.HOSTINGER_PASS }}
        run: |
          rsync -avz --delete \
            -e "sshpass -e ssh -p 65002 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='*.pdf' \
            --exclude='specs/' \
            --exclude='pages/' \
            --exclude='github-actions-key*' \
            ./ u415053603@145.79.20.84:/home/u415053603/domains/desqenergy.com/public_html/wp-content/themes/desq-energy-theme/
          echo "Deploy OK"
